<div class="login-container">
  <div class="login-content">
    <div class="login-image">
      <img src="assets/signup.jpg" alt="Login Image" loading="lazy">
    </div>
    <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Admin Login</mat-card-title>
      <mat-card-subtitle>Sign in to your admin account</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" aria-label="Admin login form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label for="login-email">Email</mat-label>
          <input 
            id="login-email"
            matInput 
            type="email" 
            formControlName="email" 
            placeholder="Enter your email"
            aria-describedby="email-error">
          <mat-error id="email-error" *ngIf="loginForm.get('email')?.hasError('required')">
            Email is required
          </mat-error>
          <mat-error id="email-error" *ngIf="loginForm.get('email')?.hasError('email')">
            Please enter a valid email
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label for="login-password">Password</mat-label>
          <input 
            id="login-password"
            matInput 
            [type]="hidePassword ? 'password' : 'text'" 
            formControlName="password"
            aria-describedby="password-error">
          <button 
            mat-icon-button 
            matSuffix 
            (click)="hidePassword = !hidePassword" 
            type="button"
            [attr.aria-label]="hidePassword ? 'Show password' : 'Hide password'">
            <mat-icon aria-hidden="true">{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error id="password-error" *ngIf="loginForm.get('password')?.hasError('required')">
            Password is required
          </mat-error>
        </mat-form-field>

        <button 
          mat-raised-button 
          color="primary" 
          type="submit" 
          [disabled]="!loginForm.valid || isLoading" 
          class="full-width submit-btn"
          aria-describedby="login-status">
          <span *ngIf="!isLoading">Login</span>
          <span *ngIf="isLoading">Logging in...</span>
        </button>
        <div id="login-status" class="sr-only" aria-live="polite"></div>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <p>Don't have an account? <a routerLink="/admin/signup">Sign up here</a></p>
    </mat-card-actions>
    </mat-card>
  </div>
</div>
