<mat-sidenav-container class="dashboard-container">
  <mat-sidenav [mode]="isMobile ? 'over' : 'side'" [opened]="sidenavOpened" class="dashboard-sidenav">
    <div class="sidenav-header">
      <h2>Admin Panel</h2>
    </div>
    
    <mat-nav-list>
      <a mat-list-item routerLink="/admin/overview" routerLinkActive="active">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      
      <a mat-list-item routerLink="/admin/confessions" routerLinkActive="active">
        <mat-icon matListItemIcon>message</mat-icon>
        <span matListItemTitle>Confessions</span>
      </a>
      
      <a mat-list-item routerLink="/admin/episodes" routerLinkActive="active">
        <mat-icon matListItemIcon>headset</mat-icon>
        <span matListItemTitle>Episodes</span>
      </a>
      
      <a mat-list-item routerLink="/admin/users" routerLinkActive="active">
        <mat-icon matListItemIcon>people</mat-icon>
        <span matListItemTitle>Users</span>
      </a>
      
      <mat-divider></mat-divider>
      
      <a mat-list-item (click)="logout()">
        <mat-icon matListItemIcon>logout</mat-icon>
        <span matListItemTitle>Logout</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="dashboard-content">
    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
