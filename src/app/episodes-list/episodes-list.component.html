@if (episodesResponse) {
  <div class="episodes-grid" role="list" aria-label="Episodes list">
    @for (episode of episodesResponse.data; track episode.id) {
      <article class="episode-card" role="listitem">
        <div class="episode-image">
          @if (episode.img_url) {
            <img [src]="episode.img_url" [alt]="'Album art for ' + episode.title" />
          } @else {
            <div class="placeholder-image" aria-label="No album art available">
              🎵
            </div>
          }
          <button 
            class="play-button" 
            (click)="togglePlayPause(episode)"
            [attr.aria-label]="isCurrentEpisodePlaying(episode) ? 'Pause ' + episode.title : 'Play ' + episode.title"
            [attr.aria-pressed]="isCurrentEpisodePlaying(episode)">
            <span *ngIf="isCurrentEpisodePlaying(episode); else playIcon">⏸️</span>
            <ng-template #playIcon>▶️</ng-template>
          </button>
        </div>
        <div class="episode-content">
          <h3 class="episode-title">
            <a [routerLink]="['/episodes', episode.id]" [attr.aria-label]="'View details for ' + episode.title">
              {{ episode.title }}
            </a>
          </h3>
          <p class="episode-description">{{ episode.description }}</p>
          <div class="episode-meta">
            <span class="duration">{{ episode.duration }}</span>
            <span class="episode-number">Episode {{ episode.id }}</span>
          </div>
        </div>
      </article>
    }
  </div>
  <app-pagination
    [currentPage]="episodesResponse.meta.page"
    [totalPages]="episodesResponse.meta.last_page"
    [totalItems]="episodesResponse.meta.total"
    [itemsPerPage]="15"
    (pageChange)="onPageChange($event)"
  ></app-pagination>
}
